<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高雄市四維長青學苑人物專欄 - 大人說</title>
  <link rel="stylesheet" href="styles.css">
  <!-- 引入 PapaParse 用於快速解析 CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

  <!-- 頂部標題區 -->
  <header class="header-bar">
    <h1>大人說</h1>
    <p>高雄市四維長青學苑人物專欄</p>
  </header>

  <!-- 主要內容區：左側選單 + 右側單頁閱讀區 -->
  <div class="main-layout">
    
    <!-- 左側文章列表選單 -->
    <aside class="sidebar">
      <h2>📚 目錄</h2>
      <ul id="article-list">
        <li class="loading-item">載入文章列表中...</li>
      </ul>
    </aside>

    <!-- 右側文章閱讀區 (直書單頁向下滾動) -->
    <main class="reading-area">
      <div id="loading" class="loading">正在載入文章內容...</div>

      <!-- 文章卡片容器 -->
      <article id="article-card" class="article-card" style="display: none;">
        <!-- 文章頭部資訊 -->
        <header class="article-header">
          <div class="article-tag">今天說什麼</div>
          <h1 id="doc-title" class="article-title"></h1>
          <div id="doc-subtitle" class="article-meta"></div>
        </header>

        <!-- 文章內文主體 -->
        <div id="doc-body" class="article-body"></div>

        <!-- 文章頁尾標籤 -->
        <footer class="article-footer">
          <p>— FIN —</p>
          <span>大人說©高雄市四維長青學苑</span>
        </footer>
      </article>

    </main>
  </div>

  <script>
    const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQWytixYJXzWPyNdLUBifTSZn33WLv89xBwAGeiYLaH2dJR-jtLmoVLOxsbql_sKObHHVylv62teioL/pub?output=csv';

    let articlesData = [];

    async function fetchCSVData() {
      // 第一次嘗試：直接抓取
      try {
        const res = await fetch(GOOGLE_SHEET_CSV_URL);
        if (res.ok) return await res.text();
      } catch (e) {
        console.warn('直接抓取 CSV 失敗，嘗試使用代理伺服器...', e);
      }

      // 第二次嘗試：使用 CORS 代理伺服器
      const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(GOOGLE_SHEET_CSV_URL)}`;
      const proxyRes = await fetch(proxyUrl);
      if (!proxyRes.ok) throw new Error(`HTTP 錯誤！狀態碼：${proxyRes.status}`);
      return await proxyRes.text();
    }

    async function loadArticles() {
      const loadingEl = document.getElementById('loading');
      try {
        const csvText = await fetchCSVData();

        Papa.parse(csvText, {
          header: true,
          skipEmptyLines: true,
          complete: function(results) {
            articlesData = results.data;
            if (!articlesData || articlesData.length === 0) {
              document.getElementById('article-list').innerHTML = '<li>目前尚無文章</li>';
              loadingEl.innerText = '⚠️ 試算表中尚無資料';
              return;
            }
            renderSidebar();
            // 預設讀取最新的第一篇文章
            displayArticle(0);
          }
        });
      } catch (err) {
        console.error('載入失敗:', err);
        loadingEl.style.color = '#d9534f';
        loadingEl.innerText = `⚠️ 文章載入失敗：${err.message}`;
      }
    }

    // 渲染左側目錄列表
    function renderSidebar() {
      const listEl = document.getElementById('article-list');
      listEl.innerHTML = '';

      articlesData.forEach((item, index) => {
        const li = document.createElement('li');
        li.innerText = item.Title || `未命名文章 ${index + 1}`;
        li.onclick = () => displayArticle(index);
        if (index === 0) li.classList.add('active');
        listEl.appendChild(li);
      });
    }

    // 顯示指定索引的文章
    function displayArticle(index) {
      const loadingEl = document.getElementById('loading');
      const articleCard = document.getElementById('article-card');
      
      loadingEl.style.display = 'block';
      articleCard.style.display = 'none';

      // 高亮左側被點選的項目
      const listItems = document.querySelectorAll('#article-list li');
      listItems.forEach((li, i) => {
        li.classList.toggle('active', i === index);
      });

      const article = articlesData[index];
      const title = article.Title || '無標題';
      const date = article.Date || '';
      const rawContent = article.Content || '';

      // 填入標題與日期
      document.getElementById('doc-title').innerText = title;
      document.getElementById('doc-subtitle').innerText = date ? `發佈日期：${date}` : '';

      // 解析內文：先依據雙換行切分大段落，若無雙換行則依單換行切分
      const paragraphs = rawContent.split(/\n\s*\n/).filter(p => p.trim() !== '');

      const formattedElements = paragraphs.map(para => {
        const trimmed = para.trim();
        if (trimmed.startsWith('###')) {
          const subTitleText = trimmed.replace(/^###\s*/, '');
          return `<h3 class="section-subtitle">${subTitleText}</h3>`;
        } else {
      // 將段落內部的單換行轉為 <br>，保持段落內部換行
      const contentWithBr = trimmed.replace(/\n/g, '<br>');
      return `<p>${contentWithBr}</p>`;
        }
      });

      document.getElementById('doc-body').innerHTML = formattedElements.join('');

      loadingEl.style.display = 'none';
      articleCard.style.display = 'block';

      // 切換文章時自動回到頁面頂端
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.addEventListener('DOMContentLoaded', loadArticles);
  </script>
</body>
</html>
