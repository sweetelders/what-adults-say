<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>й«ҳйӣ„еёӮеӣӣз¶ӯй•·йқ’еӯёиӢ‘дәәзү©е°Ҳж¬„ - еӨ§дәәиӘӘ</title>
  <link rel="stylesheet" href="styles.css">
  <!-- еј•е…Ҙ PapaParse з”Ёж–јеҝ«йҖҹи§Јжһҗ CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

  <!-- й ӮйғЁжЁҷйЎҢеҚҖ -->
  <header class="header-bar">
    <h1>WHAT ADULTS SAY</h1>
    <p>еӨ§дәәиӘӘзҡ„йӮЈдәӣдәӢ пҪң ж–Үз« е°Ҳж¬„</p>
  </header>

  <!-- дё»иҰҒе…§е®№еҚҖпјҡе·ҰеҒҙйҒёе–® + еҸіеҒҙе–®й Ғй–ұи®ҖеҚҖ -->
  <div class="main-layout">
    
    <!-- е·ҰеҒҙж–Үз« еҲ—иЎЁйҒёе–® -->
    <aside class="sidebar">
      <h2>рҹ“ҡ ж–Үз« зӣ®йҢ„</h2>
      <ul id="article-list">
        <li class="loading-item">ијүе…Ҙж–Үз« еҲ—иЎЁдёӯ...</li>
      </ul>
    </aside>

    <!-- еҸіеҒҙж–Үз« й–ұи®ҖеҚҖ (зӣҙжӣёе–®й Ғеҗ‘дёӢж»ҫеӢ•) -->
    <main class="reading-area">
      <div id="loading" class="loading">жӯЈеңЁијүе…Ҙж–Үз« е…§е®№...</div>

      <!-- ж–Үз« еҚЎзүҮе®№еҷЁ -->
      <article id="article-card" class="article-card" style="display: none;">
        <!-- ж–Үз« й ӯйғЁиіҮиЁҠ -->
        <header class="article-header">
          <div class="article-tag">ESSAY & ARTICLE</div>
          <h1 id="doc-title" class="article-title"></h1>
          <div id="doc-subtitle" class="article-meta"></div>
        </header>

        <!-- ж–Үз« е…§ж–Үдё»й«” -->
        <div id="doc-body" class="article-body"></div>

        <!-- ж–Үз« й Ғе°ҫжЁҷзұӨ -->
        <footer class="article-footer">
          <p>вҖ” END OF ARTICLE вҖ”</p>
          <span>еӨ§дәәиӘӘзҡ„йӮЈдәӣдәӢ</span>
        </footer>
      </article>

    </main>
  </div>

  <script>
    const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQWytixYJXzWPyNdLUBifTSZn33WLv89xBwAGeiYLaH2dJR-jtLmoVLOxsbql_sKObHHVylv62teioL/pub?output=csv';

    let articlesData = [];

    async function fetchCSVData() {
      // з¬¬дёҖж¬Ўеҳ—и©ҰпјҡзӣҙжҺҘжҠ“еҸ–
      try {
        const res = await fetch(GOOGLE_SHEET_CSV_URL);
        if (res.ok) return await res.text();
      } catch (e) {
        console.warn('зӣҙжҺҘжҠ“еҸ– CSV еӨұж•—пјҢеҳ—и©ҰдҪҝз”Ёд»ЈзҗҶдјәжңҚеҷЁ...', e);
      }

      // з¬¬дәҢж¬Ўеҳ—и©ҰпјҡдҪҝз”Ё CORS д»ЈзҗҶдјәжңҚеҷЁ
      const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(GOOGLE_SHEET_CSV_URL)}`;
      const proxyRes = await fetch(proxyUrl);
      if (!proxyRes.ok) throw new Error(`HTTP йҢҜиӘӨпјҒзӢҖж…Ӣзўјпјҡ${proxyRes.status}`);
      return await proxyRes.text();
    }

    async function loadArticles() {
      const loadingEl = document.getElementById('loading');
      try {
        const csvText = await fetchCSVData();

        Papa.parse(csvText, {
          header: true,
          skipEmptyLines: true,
          complete: function(results) {
            articlesData = results.data;
            if (!articlesData || articlesData.length === 0) {
              document.getElementById('article-list').innerHTML = '<li>зӣ®еүҚе°ҡз„Ўж–Үз« </li>';
              loadingEl.innerText = 'вҡ пёҸ и©Ұз®—иЎЁдёӯе°ҡз„ЎиіҮж–ҷ';
              return;
            }
            renderSidebar();
            // й җиЁӯи®ҖеҸ–жңҖж–°зҡ„з¬¬дёҖзҜҮж–Үз« 
            displayArticle(0);
          }
        });
      } catch (err) {
        console.error('ијүе…ҘеӨұж•—:', err);
        loadingEl.style.color = '#d9534f';
        loadingEl.innerText = `вҡ пёҸ ж–Үз« ијүе…ҘеӨұж•—пјҡ${err.message}`;
      }
    }

    // жёІжҹ“е·ҰеҒҙзӣ®йҢ„еҲ—иЎЁ
    function renderSidebar() {
      const listEl = document.getElementById('article-list');
      listEl.innerHTML = '';

      articlesData.forEach((item, index) => {
        const li = document.createElement('li');
        li.innerText = item.Title || `жңӘе‘ҪеҗҚж–Үз«  ${index + 1}`;
        li.onclick = () => displayArticle(index);
        if (index === 0) li.classList.add('active');
        listEl.appendChild(li);
      });
    }

    // йЎҜзӨәжҢҮе®ҡзҙўеј•зҡ„ж–Үз« 
    function displayArticle(index) {
      const loadingEl = document.getElementById('loading');
      const articleCard = document.getElementById('article-card');
      
      loadingEl.style.display = 'block';
      articleCard.style.display = 'none';

      // й«ҳдә®е·ҰеҒҙиў«й»һйҒёзҡ„й …зӣ®
      const listItems = document.querySelectorAll('#article-list li');
      listItems.forEach((li, i) => {
        li.classList.toggle('active', i === index);
      });

      const article = articlesData[index];
      const title = article.Title || 'з„ЎжЁҷйЎҢ';
      const date = article.Date || '';
      const rawContent = article.Content || '';

      // еЎ«е…ҘжЁҷйЎҢиҲҮж—Ҙжңҹ
      document.getElementById('doc-title').innerText = title;
      document.getElementById('doc-subtitle').innerText = date ? `зҷјдҪҲж—Ҙжңҹпјҡ${date}` : '';

      // и§Јжһҗе…§ж–Үпјҡе°Ү ### иЎҢиҪүзӮә <h3>пјҢе…¶д»–иҪүзӮә <p>
      const lines = rawContent.split('\n').filter(line => line.trim() !== '');
      const formattedElements = lines.map(line => {
        const trimmed = line.trim();
        if (trimmed.startsWith('###')) {
          const subTitleText = trimmed.replace(/^###\s*/, '');
          return `<h3 class="section-subtitle">${subTitleText}</h3>`;
        } else {
          return `<p>${trimmed}</p>`;
        }
      });

      // зӣҙжҺҘеЎ«е…Ҙе–®дёҖж–ҮзЁҝе®№еҷЁ
      document.getElementById('doc-body').innerHTML = formattedElements.join('');

      loadingEl.style.display = 'none';
      articleCard.style.display = 'block';

      // еҲҮжҸӣж–Үз« жҷӮиҮӘеӢ•еӣһеҲ°й Ғйқўй Ӯз«Ҝ
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    window.addEventListener('DOMContentLoaded', loadArticles);
  </script>
</body>
</html>
