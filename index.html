<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>高雄市四維長青學苑人物專欄 - 大人說</title>
  <link rel="stylesheet" href="styles.css">
  <!-- 引入 StPageFlip 翻頁套件 -->
  <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
  <!-- 引入 PapaParse 用於快速解析 CSV -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>

  <!-- 頂部標題區 -->
  <header class="header-bar">
    <h1>WHAT ADULTS SAY</h1>
    <p>大人說的那些事 ｜ 文章專欄</p>
  </header>

  <!-- 主要內容區：左側選單 + 右側雜誌 -->
  <div class="main-layout">
    
    <!-- 左側文章列表選單 -->
    <aside class="sidebar">
      <h2>📚 文章目錄</h2>
      <ul id="article-list">
        <li class="loading-item">載入文章列表中...</li>
      </ul>
    </aside>

    <!-- 右側雜誌閱讀區 -->
    <main class="magazine-area">
      <div id="loading" class="loading">正在載入文章內容...</div>

      <div class="magazine-container">
        <div id="magazine" class="magazine">
          
          <!-- Page 1: 封面 -->
          <div class="page page-cover">
            <div class="page-content">
              <div class="cover-tag">ESSAY & ARTICLE</div>
              <h1 id="doc-title">請選擇文章</h1>
              <p id="doc-subtitle" class="subtitle">---</p>
            </div>
          </div>

          <!-- Page 2: 左頁 (前半段文字) -->
          <div class="page">
            <div class="page-content">
              <span class="page-number">- 01 -</span>
              <div class="article-body" id="doc-body-1"></div>
            </div>
          </div>

          <!-- Page 3: 右頁 (後半段文字) -->
          <div class="page">
            <div class="page-content">
              <span class="page-number">- 02 -</span>
              <div class="article-body" id="doc-body-2"></div>
            </div>
          </div>

          <!-- Page 4: 封底 -->
          <div class="page page-back">
            <div class="page-content">
              <div class="back-footer">
                <h3>END OF ARTICLE</h3>
                <p>感謝閱讀 ｜ 大人說的那些事</p>
              </div>
            </div>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script>
    // 已更新為你的 Google 試算表 CSV 網址
    const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQWytixYJXzWPyNdLUBifTSZn33WLv89xBwAGeiYLaH2dJR-jtLmoVLOxsbql_sKObHHVylv62teioL/pub?output=csv';

    let articlesData = [];
    let pageFlipInstance = null;

    async function fetchCSVData() {
      // 第一次嘗試：直接抓取
      try {
        const res = await fetch(GOOGLE_SHEET_CSV_URL);
        if (res.ok) return await res.text();
      } catch (e) {
        console.warn('直接抓取 CSV 失敗，嘗試使用代理伺服器...', e);
      }

      // 第二次嘗試：使用 CORS 代理伺服器
      const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(GOOGLE_SHEET_CSV_URL)}`;
      const proxyRes = await fetch(proxyUrl);
      if (!proxyRes.ok) throw new Error(`HTTP 錯誤！狀態碼：${proxyRes.status}`);
      return await proxyRes.text();
    }

    async function loadArticles() {
      const loadingEl = document.getElementById('loading');
      try {
        const csvText = await fetchCSVData();

        // 解析 CSV 資料
        Papa.parse(csvText, {
          header: true,
          skipEmptyLines: true,
          complete: function(results) {
            articlesData = results.data;
            if (!articlesData || articlesData.length === 0) {
              document.getElementById('article-list').innerHTML = '<li>目前尚無文章</li>';
              loadingEl.innerText = '⚠️ 試算表中尚無資料';
              return;
            }
            renderSidebar();
            // 預設讀取最新的第一篇文章
            displayArticle(0);
          }
        });
      } catch (err) {
        console.error('載入失敗:', err);
        loadingEl.style.color = '#d9534f';
        loadingEl.innerText = `⚠️ 文章載入失敗：${err.message}`;
      }
    }

    // 渲染左側目錄列表
    function renderSidebar() {
      const listEl = document.getElementById('article-list');
      listEl.innerHTML = '';

      articlesData.forEach((item, index) => {
        const li = document.createElement('li');
        li.innerText = item.Title || `未命名文章 ${index + 1}`;
        li.onclick = () => displayArticle(index);
        if (index === 0) li.classList.add('active');
        listEl.appendChild(li);
      });
    }

    // 顯示指定索引的文章
    function displayArticle(index) {
      document.getElementById('loading').style.display = 'block';

      // 高亮左側被點選的項目
      const listItems = document.querySelectorAll('#article-list li');
      listItems.forEach((li, i) => {
        li.classList.toggle('active', i === index);
      });

      const article = articlesData[index];
      const title = article.Title || '無標題';
      const date = article.Date || '';
      const rawContent = article.Content || '';

      // 填入標題與日期
      document.getElementById('doc-title').innerText = title;
      document.getElementById('doc-subtitle').innerText = date;

      // 拆分每一行內文，將帶有 ### 的行轉為 <h3> 小標題，其餘轉為 <p>
      const lines = rawContent.split('\n').filter(line => line.trim() !== '');
      const formattedElements = lines.map(line => {
        const trimmed = line.trim();
        if (trimmed.startsWith('###')) {
          const subTitleText = trimmed.replace(/^###\s*/, '');
          return `<h3 class="section-subtitle">${subTitleText}</h3>`;
        } else {
          return `<p>${trimmed}</p>`;
        }
      });

      // 將內容元素均分到左右兩頁
      const midPoint = Math.ceil(formattedElements.length / 2);

      document.getElementById('doc-body-1').innerHTML = formattedElements.slice(0, midPoint).join('');
      document.getElementById('doc-body-2').innerHTML = formattedElements.slice(midPoint).join('');

      document.getElementById('loading').style.display = 'none';

      // 重設或初始化翻頁套件
      initOrUpdatePageFlip();
    }

    function initOrUpdatePageFlip() {
      const isMobile = window.innerWidth <= 768;

      if (!pageFlipInstance) {
        pageFlipInstance = new St.PageFlip(document.getElementById('magazine'), {
          width: isMobile ? 320 : 440,   // 桌機版單頁寬度 440px
          height: isMobile ? 500 : 640,  // 桌機版單頁高度 640px (加大高度容納更多內容)
          size: "fixed",
          minWidth: 300,
          maxWidth: 1000,
          minHeight: 400,
          maxHeight: 850,
          maxShadowOpacity: 0.5,
          showCover: true,
          mobileScrollSupport: true
        });
        pageFlipInstance.loadFromHTML(document.querySelectorAll('.page'));
      } else {
        // 若已初始化過，切換文章時回到第一頁 (封面)
        pageFlipInstance.turnToPage(0);
      }
    }

    window.addEventListener('DOMContentLoaded', loadArticles);
  </script>
</body>
</html>
